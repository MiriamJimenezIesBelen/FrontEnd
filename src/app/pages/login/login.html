<div class="auth-page">

  <div class="auth-card">

    <div class="auth-header">
      <h2>Acceso a tu panel</h2>
      <p>Gestiona el impacto ambiental de tu empresa</p>
    </div>

    <input
      type="email"
      [(ngModel)]="correo"
      placeholder="Correo empresarial"
      [disabled]="cargando">

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Contraseña"
      [disabled]="cargando">

    <button class="auth-btn" (click)="login()" [disabled]="cargando">
      <span *ngIf="!cargando">Iniciar sesión</span>
      <span *ngIf="cargando">⏳ Conectando...</span>
    </button>



    <p class="error" *ngIf="error">Credenciales incorrectas</p>

    <button class="auth-back" routerLink="/home" [disabled]="cargando">
      ← Volver
    </button>

  </div>

</div>
