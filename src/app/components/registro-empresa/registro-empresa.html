<div class="empresa-page">

  <!-- TOAST -->
  <div class="toast" *ngIf="toastVisible" [ngClass]="toastTipo === 'success' ? 'toast-success' : 'toast-error'">
    {{ toastMensaje }}
  </div>

  <!-- IZQUIERDA: INFO -->
  <div class="empresa-info">
    <h1>ImpactoVisible</h1>
    <p>Registra tu empresa y empieza a medir tu impacto ambiental real.</p>
    <ul>
      <li>⚡ Análisis automático de eficiencia</li>
      <li>💧 Control de consumo de agua</li>
      <li>🌫️ Huella de CO₂</li>
      <li>🗑️ Gestión de residuos</li>
      <li>🏆 Ranking ESG</li>
    </ul>
  </div>

  <!-- DERECHA: FORMULARIO -->
  <div class="empresa-card">

    <h2>Registrar empresa</h2>

    <form (ngSubmit)="onSubmit()" class="registro-form">

      <input
        type="text"
        placeholder="Nombre de la empresa"
        [(ngModel)]="nuevaEmpresa.nombre"
        name="nombre"
        required>

      <input
        type="text"
        placeholder="Número de registro (opcional)"
        [(ngModel)]="nuevaEmpresa.numeroRegistro"
        name="numeroRegistro">

      <input
        type="text"
        placeholder="Sector (ej: Tecnología, Industria…)"
        [(ngModel)]="nuevaEmpresa.sector"
        name="sector"
        required>

      <input
        type="text"
        placeholder="País"
        [(ngModel)]="nuevaEmpresa.pais"
        name="pais"
        required>

      <input
        type="text"
        placeholder="Ciudad"
        [(ngModel)]="nuevaEmpresa.ciudad"
        name="ciudad">

      <select
        [(ngModel)]="nuevaEmpresa.tamano"
        name="tamano"
        required>
        <option value="">Tamaño de empresa</option>
        <option value="pequena">Pequeña (&lt;50 empleados)</option>
        <option value="mediana">Mediana (51–250 empleados)</option>
        <option value="grande">Gran empresa (+250 empleados)</option>
      </select>

      <input
        type="email"
        placeholder="Correo de contacto"
        [(ngModel)]="nuevaEmpresa.correoContacto"
        name="correoContacto"
        required>

      <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="nuevaEmpresa.password"
        name="password"
        required>

      <button type="submit" class="btn-crear" [disabled]="guardando">
        {{ guardando ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>

    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>

    <button class="btn-volver" routerLink="/home">← Volver</button>

  </div>
</div>
