<header class="main-header">
  <div class="header-inner">

    <!-- Logo -->
    <a class="logo-link" routerLink="/home">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" fill="#2e8b57" opacity="0.15"/>
          <circle cx="16" cy="16" r="9" fill="#2e8b57" opacity="0.3"/>
          <path d="M16 8 C12 13, 12 20, 16 23 C20 20, 20 13, 16 8Z" fill="#2e8b57"/>
          <circle cx="16" cy="16" r="3" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">ImpactoVisible</span>
    </a>

    <!-- Nav DESKTOP con scroll + flechas (oculto en móvil por CSS) -->
    <div class="nav-desktop-wrap" *ngIf="isLoggedIn">
      <button class="scroll-btn" [class.hidden]="atStart" (click)="scrollNav(-160)" aria-label="Anterior">&#8249;</button>
      <div class="nav-scroll-wrap" [class.at-start]="atStart" [class.at-end]="atEnd">
        <nav class="nav-scroll" #navScroll (scroll)="onNavScroll($event)">
          <a routerLink="/dashboard"            class="nav-link" routerLinkActive="active">Dashboard</a>
          <a routerLink="/registro-impacto"     class="nav-link" routerLinkActive="active">Registrar</a>
          <a routerLink="/objetivos"            class="nav-link" routerLinkActive="active">Objetivos</a>
          <a routerLink="/simulador-plan"       class="nav-link" routerLinkActive="active">Plan</a>
          <a routerLink="/calculadora"          class="nav-link" routerLinkActive="active">Calculadora</a>
          <a routerLink="/buscador-proveedores" class="nav-link" routerLinkActive="active">Proveedores</a>
          <a routerLink="/simulador-esg"        class="nav-link" routerLinkActive="active">🧪 Simulador</a>
          <a routerLink="/informe-pdf"          class="nav-link" routerLinkActive="active">Informe</a>
          <a routerLink="/comunidad"            class="nav-link" routerLinkActive="active">Comunidad</a>
          <a routerLink="/ranking"              class="nav-link" routerLinkActive="active">🏆 Ranking</a>
        </nav>
      </div>
      <button class="scroll-btn" [class.hidden]="atEnd" (click)="scrollNav(160)" aria-label="Siguiente">&#8250;</button>
    </div>

    <!-- Acciones derecha -->
    <div class="nav-actions">
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login"            class="btn-outline">Iniciar Sesión</a>
        <a routerLink="/registro-empresa" class="btn-solid">Registrarse</a>
      </ng-container>

      <div *ngIf="isLoggedIn" class="user-block">
        <div class="avatar">{{ nombreEmpresa.charAt(0) }}</div>
        <span class="user-name">{{ nombreEmpresa }}</span>
        <button (click)="logout()" class="btn-logout">Salir</button>
      </div>

      <button class="hamburger" (click)="toggleMenu()" *ngIf="isLoggedIn"
              [class.active]="menuAbierto" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Nav MÓVIL drawer (oculto en desktop por CSS) -->
  <nav class="nav-mobile" *ngIf="isLoggedIn" [class.open]="menuAbierto">
    <button class="nav-close" (click)="toggleMenu()">✕</button>
    <a routerLink="/dashboard"            class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Dashboard</a>
    <a routerLink="/registro-impacto"     class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Registrar</a>
    <a routerLink="/objetivos"            class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Objetivos</a>
    <a routerLink="/simulador-plan"       class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Plan</a>
    <a routerLink="/calculadora"          class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Calculadora</a>
    <a routerLink="/buscador-proveedores" class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Proveedores</a>
    <a routerLink="/simulador-esg"        class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">🧪 Simulador</a>
    <a routerLink="/informe-pdf"          class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Informe</a>
    <a routerLink="/comunidad"            class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">Comunidad</a>
    <a routerLink="/ranking"              class="nav-link" routerLinkActive="active" (click)="menuAbierto=false">🏆 Ranking</a>
  </nav>

  <div class="mobile-overlay" *ngIf="menuAbierto" (click)="toggleMenu()"></div>
</header>
