

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: impactovisibledb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  spring-app:
    build: .
    container_name: spring-app
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "8080:8080"